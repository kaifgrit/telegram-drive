<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Drive Cloud Explorer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .app-card { background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 700px; box-sizing: border-box; }
        h2, h3 { color: #0088cc; margin-top: 0; margin-bottom: 20px; text-align: center; }
        p { color: #555; font-size: 14px; line-height: 1.5; text-align: center; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #f8fafc; }
        button { width: 100%; padding: 14px; background: #0088cc; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; margin-top: 5px; }
        button:hover { background: #0077b3; }
        .hidden-layout { display: none !important; }
        #message-banner { margin-top: 20px; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; display: none; background: #f1f5f9; color: #334155; text-align: center; }
        
        .control-panel-grid { border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; background: #f8fafc; margin-top: 15px; margin-bottom: 20px; }
        .logout-link { display: block; text-align: center; color: #ef4444; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: underline; margin-top: 25px; }
        
        /* BREADCRUMBS PATH NAVIGATOR STYLES */
        .breadcrumbs-bar { background: #e2e8f0; padding: 10px 15px; border-radius: 6px; font-size: 14px; margin-bottom: 15px; text-align: left; font-weight: 500; color: #475569; }
        .crumb-node { color: #0088cc; cursor: pointer; text-decoration: none; }
        .crumb-node:hover { text-decoration: underline; }
        
        /* FILE MANAGER EXPLORER TABLE GRID */
        .explorer-section { margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; font-weight: 600; }
        tr:hover { background: #fdfdfd; }
        
        .folder-item { color: #b45309; font-weight: 700; cursor: pointer; }
        .folder-item:hover { text-decoration: underline; }
        .dl-btn { background: #10b981; padding: 6px 12px; color: white; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: 600; display: inline-block; }
        .dl-btn:hover { background: #059669; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Telegram Drive Engine</h2>
    
    <div id="view-phone">
        <p>Enter your Telegram number in standard international format.</p>
        <input type="text" id="phone-field" placeholder="+918853438021">
        <button type="button" onclick="executeSessionHandshake()">Connect Storage Instance</button>
    </div>

    <div id="view-otp" class="hidden-layout">
        <p>Input validation passcode sent to your official Telegram channel.</p>
        <input type="text" id="otp-field" placeholder="Enter Secure Passcode">
        <button type="button" onclick="executeOtpVerification()">Authorize & Mount Drive</button>
    </div>

    <div id="view-drive" class="hidden-layout">
        <h3>⚡ Virtual Cloud Storage Workspace</h3>
        
        <div class="control-panel-grid">
            <div style="margin-bottom: 15px;">
                <label style="font-size: 13px; font-weight:600; color:#475569;">📁 Create Directory Branch</label>
                <input type="text" id="folder-name-field" placeholder="Target folder title (e.g. Invoices)">
                <button type="button" onclick="executeFolderCreation()">Create Folder</button>
            </div>
            <div>
                <label style="font-size: 13px; font-weight:600; color:#475569;">📤 File Stream Dispatcher</label>
                <input type="file" id="file-payload" style="display:block; margin: 10px 0;">
                <button type="button" onclick="executeCloudUpload()">Commit Stream to Cloud</button>
            </div>
        </div>

        <div class="explorer-section">
            <div id="breadcrumbs-trail" class="breadcrumbs-bar"></div>
            
            <input type="text" id="search-input" placeholder="🔍 Filter current items..." oninput="filterFileExplorer()">
            
            <table>
                <thead>
                    <tr>
                        <th>Asset Name</th>
                        <th>Type/Size</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="file-table-body"></tbody>
            </table>
        </div>

        <div class="logout-link" onclick="executeSessionPurge()">Disconnect Local Environment</div>
    </div>

    <div id="message-banner"></div>
</div>

<script>
    const SERVER_URL = "http://127.0.0.1:8000/api";
    let activeUserPhone = localStorage.getItem("authenticated_user_phone") || "";
    
    // Core Navigation Virtual Directory Topology States
    let currentFolderId = "null"; 
    let navigationBreadcrumbsCache = [{ id: "null", name: "Home" }];
    let rawDirectoryFiles = [];
    let rawDirectoryFolders = [];

    window.onload = function() {
        if (activeUserPhone) {
            triggerLayoutTransition('view-drive');
            printFeedback(`Active session restored: ${activeUserPhone}`, "green");
            syncFileSystemExplorerNodes();
        }
    };

    function printFeedback(msg, styleColor = "slate") {
        const banner = document.getElementById('message-banner');
        banner.style.display = "block"; banner.innerText = msg;
        if (styleColor === "green") { banner.style.backgroundColor = "#bbf7d0"; banner.style.color = "#15803d"; }
        else if (styleColor === "orange") { banner.style.backgroundColor = "#fed7aa"; banner.style.color = "#c2410c"; }
        else if (styleColor === "red") { banner.style.backgroundColor = "#fecaca"; banner.style.color = "#b91c1c"; }
        else { banner.style.backgroundColor = "#e2e8f0"; banner.style.color = "#334155"; }
    }

    function triggerLayoutTransition(targetId) {
        document.getElementById('view-phone').classList.add('hidden-layout');
        document.getElementById('view-otp').classList.add('hidden-layout');
        document.getElementById('view-drive').classList.add('hidden-layout');
        document.getElementById(targetId).classList.remove('hidden-layout');
    }

    async function executeSessionHandshake() {
        const inputVal = document.getElementById('phone-field').value.trim();
        if (!inputVal) return alert("Phone number required.");
        activeUserPhone = inputVal;
        printFeedback("Evaluating server lifecycle nodes...", "orange");

        try {
            const check = await fetch(`${SERVER_URL}/auth/check-session`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: activeUserPhone })
            });
            const sessionStatus = await check.json();

            if (sessionStatus.status === "authenticated") {
                localStorage.setItem("authenticated_user_phone", activeUserPhone);
                triggerLayoutTransition('view-drive');
                printFeedback("System verification accepted. Drive online.", "green");
                syncFileSystemExplorerNodes();
                return;
            }

            const res = await fetch(`${SERVER_URL}/auth/send-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: activeUserPhone })
            });
            if (res.ok) {
                triggerLayoutTransition('view-otp');
                printFeedback("Validation code sent! Check Telegram App.", "green");
            } else { printFeedback("Access Denied", "red"); }
        } catch (e) { printFeedback("Connection timed out.", "red"); }
    }

    async function executeOtpVerification() {
        const otpVal = document.getElementById('otp-field').value.trim();
        try {
            const res = await fetch(`${SERVER_URL}/auth/verify-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: activeUserPhone, otp_code: otpVal })
            });
            if (res.ok) {
                localStorage.setItem("authenticated_user_phone", activeUserPhone);
                triggerLayoutTransition('view-drive');
                printFeedback("Authorization complete. Vault mounted.", "green");
                syncFileSystemExplorerNodes();
            } else { printFeedback("Invalid Token code passed", "red"); }
        } catch (e) { printFeedback("Verification failure.", "red"); }
    }

    // VFS AGGREGATION LOOKUP ENGINE
    async function syncFileSystemExplorerNodes() {
        try {
            const url = `${SERVER_URL}/drive/explorer/nodes?phone_number=${encodeURIComponent(activeUserPhone)}&parent_folder_id=${currentFolderId}`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (res.ok) {
                rawDirectoryFiles = data.files;
                rawDirectoryFolders = data.folders;
                renderExplorerGrid(rawDirectoryFolders, rawDirectoryFiles);
                renderBreadcrumbTrail();
            }
        } catch (e) { printFeedback("VFS node mapping connection dropped.", "red"); }
    }

    function renderBreadcrumbTrail() {
        const trailContainer = document.getElementById('breadcrumbs-trail');
        trailContainer.innerHTML = "";
        
        navigationBreadcrumbsCache.forEach((crumb, index) => {
            const nodeSpan = document.createElement('span');
            if (index === navigationBreadcrumbsCache.length - 1) {
                nodeSpan.innerText = crumb.name;
            } else {
                nodeSpan.innerHTML = `<span class="crumb-node" onclick="navigateBreadcrumbDepth(${index})">${crumb.name}</span> / `;
            }
            trailContainer.appendChild(nodeSpan);
        });
    }

    function navigateBreadcrumbDepth(targetIndex) {
        // Splice cache array up to targeted node parameters
        const selectedCrumb = navigationBreadcrumbsCache[targetIndex];
        navigationBreadcrumbsCache = navigationBreadcrumbsCache.slice(0, targetIndex + 1);
        currentFolderId = selectedCrumb.id;
        syncFileSystemExplorerNodes();
    }

    function drillDownFolder(folderId, folderName) {
        currentFolderId = folderId;
        navigationBreadcrumbsCache.push({ id: folderId, name: folderName });
        syncFileSystemExplorerNodes();
    }

    function renderExplorerGrid(folders, files) {
        const tbody = document.getElementById('file-table-body');
        tbody.innerHTML = "";
        
        if (folders.length === 0 && files.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#94a3b8;">This folder directory is empty.</td></tr>`;
            return;
        }

        // Render Folder directory elements
        folders.forEach(dir => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="folder-item" onclick="drillDownFolder('${dir._id}', '${dir.folder_name}')">📁 ${dir.folder_name}</td>
                <td>Folder</td>
                <td>--</td>
            `;
            tbody.appendChild(row);
        });

        // Render File items
        files.forEach(file => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>📄 <b>${file.filename}</b></td>
                <td>${file.size.toLocaleString()} Bytes</td>
                <td><a class="dl-btn" href="${SERVER_URL}/drive/download/${file._id}?phone_number=${encodeURIComponent(activeUserPhone)}" target="_blank">📥 Download</a></td>
            `;
            tbody.appendChild(row);
        });
    }

    async function executeFolderCreation() {
        const field = document.getElementById('folder-name-field');
        const folderName = field.value.trim();
        if (!folderName) return alert("Directory label name string context cannot remain null.");
        
        printFeedback("Generating isolated partition branch...", "orange");
        try {
            const res = await fetch(`${SERVER_URL}/drive/folder/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    folder_name: folderName,
                    phone_number: activeUserPhone,
                    parent_folder_id: currentFolderId
                })
            });
            if (res.ok) {
                printFeedback("Directory branch mounted into partition tree successfully.", "green");
                field.value = "";
                syncFileSystemExplorerNodes();
            }
        } catch (e) { printFeedback("Directory allocation fault error context.", "red"); }
    }

    async function executeCloudUpload() {
        const fileInput = document.getElementById('file-payload');
        if (fileInput.files.length === 0) return alert("Select an item payload file item first.");
        printFeedback("Streaming binary frames into infrastructure...", "orange");

        const structuralPayload = new FormData();
        structuralPayload.append("phone_number", activeUserPhone);
        structuralPayload.append("parent_folder_id", currentFolderId); // Dynamically tags data with active location context link
        structuralPayload.append("file", fileInput.files[0]);

        try {
            const res = await fetch(`${SERVER_URL}/drive/upload`, { method: 'POST', body: structuralPayload });
            if (res.ok) {
                printFeedback("Upload stream processed and stored!", "green");
                fileInput.value = "";
                syncFileSystemExplorerNodes();
            } else { printFeedback("Pipeline processing failure.", "red"); }
        } catch (e) { printFeedback("Network transmission pipeline error.", "red"); }
    }

    function filterFileExplorer() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        const filteredFolders = rawDirectoryFolders.filter(f => f.folder_name.toLowerCase().includes(query));
        const filteredFiles = rawDirectoryFiles.filter(f => f.filename.toLowerCase().includes(query));
        renderExplorerGrid(filteredFolders, filteredFiles);
    }

    function executeSessionPurge() {
        localStorage.clear(); activeUserPhone = ""; triggerLayoutTransition('view-phone');
        printFeedback("Platform cache purged.", "slate");
    }
</script>
</body>
</html>
