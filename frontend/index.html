<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Drive | Professional Cloud</title>
    <style>
        /* Modern CSS Variables Palette */
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --radius: 12px;
            --shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
        }

        /* Global Reset & Typography */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; line-height: 1.5; }

        /* Main Application Container */
        .app-card { background: var(--bg-card); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow); width: 100%; max-width: 800px; transition: all 0.3s ease; }
        
        /* Headers & Text */
        h2 { color: var(--text-main); font-size: 24px; font-weight: 700; margin-bottom: 8px; text-align: center; letter-spacing: -0.5px; }
        h3 { color: var(--text-main); font-size: 18px; font-weight: 600; margin-bottom: 16px; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; }
        p.subtitle { color: var(--text-muted); font-size: 15px; text-align: center; margin-bottom: 30px; }

        /* Form Inputs & Controls */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: #fdfdfd; transition: all 0.2s; color: var(--text-main); }
        input[type="text"]:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1); background: #fff; }
        
        /* Primary Buttons */
        button.btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        button.btn-primary:hover { background: var(--primary-hover); }
        button.btn-primary:active { transform: scale(0.98); }

        /* Layout Utilities */
        .hidden-layout { display: none !important; }
        
        /* Notifications */
        #message-banner { margin-top: 24px; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 500; display: none; text-align: center; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Management Panel */
        .control-panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f8fafc; padding: 24px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        
        /* Action Buttons (Small) */
        button.btn-action { background: var(--success); color: white; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
        button.btn-action:hover { opacity: 0.9; }
        button.btn-danger { background: var(--danger); }
        button.btn-danger:hover { background: var(--danger-hover); }

        /* VFS Explorer Styles */
        .breadcrumbs-bar { background: #f1f5f9; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; font-weight: 500; color: var(--text-muted); border: 1px solid var(--border-color); display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        .crumb-node { color: var(--primary); cursor: pointer; text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .crumb-node:hover { color: var(--primary-hover); text-decoration: underline; }
        .crumb-separator { color: #cbd5e1; margin: 0 4px; }

        /* Data Table */
        .table-container { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: left; white-space: nowrap; }
        th, td { padding: 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { background: #f8fafc; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fdfdfd; }
        
        .folder-item { color: var(--primary); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .folder-item:hover { text-decoration: underline; }
        .file-item { display: flex; align-items: center; gap: 8px; color: var(--text-main); font-weight: 500; }
        
        .action-cell { display: flex; gap: 8px; }

        /* Logout Link */
        .logout-link { display: inline-block; text-align: center; color: var(--danger); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 30px; transition: opacity 0.2s; width: 100%; }
        .logout-link:hover { opacity: 0.8; text-decoration: underline; }

        /* Mobile Responsiveness */
        @media (max-width: 640px) {
            .app-card { padding: 24px; }
            .control-panel-grid { grid-template-columns: 1fr; gap: 16px; }
            .action-cell { flex-direction: column; }
            button.btn-action { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<div class="app-card">
    
    <div id="view-phone">
        <h2>Telegram Drive</h2>
        <p class="subtitle">Secure Personal Cloud Storage Engine</p>
        
        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phone-field" placeholder="+1 (234) 567-8900">
        </div>
        <button type="button" class="btn-primary" onclick="executeSessionHandshake()">Connect Storage Instance</button>
    </div>

    <div id="view-otp" class="hidden-layout">
        <h2>Verification Required</h2>
        <p class="subtitle">Enter the code sent to your Telegram app.</p>
        
        <div class="input-group">
            <label>Secure Passcode</label>
            <input type="text" id="otp-field" placeholder="Enter 5-digit code">
        </div>
        <button type="button" class="btn-primary" onclick="executeOtpVerification()">Authorize & Mount Drive</button>
    </div>

    <div id="view-drive" class="hidden-layout">
        <h2>Your Drive Workspace</h2>
        <p class="subtitle">Manage and organize your secure file system.</p>
        
        <div class="control-panel-grid">
            <div>
                <div class="input-group" style="margin-bottom: 12px;">
                    <label>📁 Create Directory</label>
                    <input type="text" id="folder-name-field" placeholder="Folder Name (e.g. Invoices)">
                </div>
                <button type="button" class="btn-primary" onclick="executeFolderCreation()">Create Folder</button>
            </div>
            <div>
                <div class="input-group" style="margin-bottom: 12px;">
                    <label>📤 Upload File</label>
                    <input type="file" id="file-payload">
                </div>
                <button type="button" class="btn-primary" onclick="executeCloudUpload()">Upload to Current Folder</button>
            </div>
        </div>

        <div class="explorer-section">
            
            <div id="breadcrumbs-trail" class="breadcrumbs-bar"></div>
            
            <div class="input-group">
                <input type="text" id="search-input" placeholder="🔍 Search current directory..." oninput="filterFileExplorer()">
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type / Size</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="file-table-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="logout-link" onclick="executeSessionPurge()">Disconnect & Logout</div>
    </div>

    <div id="message-banner"></div>
</div>

<script>
    const SERVER_URL = "http://127.0.0.1:8000/api";
    let activeUserPhone = localStorage.getItem("authenticated_user_phone") || "";
    
    let currentFolderId = "null"; 
    let navigationBreadcrumbsCache = [{ id: "null", name: "Home" }];
    let rawDirectoryFiles = [];
    let rawDirectoryFolders = [];

    window.onload = function() {
        if (activeUserPhone) {
            triggerLayoutTransition('view-drive');
            syncFileSystemExplorerNodes();
        }
    };

    function printFeedback(msg, styleClass = "slate") {
        const banner = document.getElementById('message-banner');
        banner.style.display = "block"; 
        banner.innerText = msg;
        
        if (styleClass === "green") { banner.style.backgroundColor = "#d1fae5"; banner.style.color = "#065f46"; border = "1px solid #34d399"; }
        else if (styleClass === "orange") { banner.style.backgroundColor = "#ffedd5"; banner.style.color = "#9a3412"; border = "1px solid #fdba74"; }
        else if (styleClass === "red") { banner.style.backgroundColor = "#fee2e2"; banner.style.color = "#991b1b"; border = "1px solid #f87171"; }
        else { banner.style.backgroundColor = "#f1f5f9"; banner.style.color = "#334155"; border = "1px solid #cbd5e1"; }
        banner.style.border = border;
    }

    function triggerLayoutTransition(targetId) {
        document.getElementById('view-phone').classList.add('hidden-layout');
        document.getElementById('view-otp').classList.add('hidden-layout');
        document.getElementById('view-drive').classList.add('hidden-layout');
        document.getElementById(targetId).classList.remove('hidden-layout');
    }

    async function executeSessionHandshake() {
        const inputVal = document.getElementById('phone-field').value.trim();
        if (!inputVal) return alert("Phone number required.");
        activeUserPhone = inputVal;
        printFeedback("Connecting to server...", "orange");

        try {
            const check = await fetch(`${SERVER_URL}/auth/check-session`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: activeUserPhone })
            });
            const sessionStatus = await check.json();

            if (sessionStatus.status === "authenticated") {
                localStorage.setItem("authenticated_user_phone", activeUserPhone);
                triggerLayoutTransition('view-drive');
                printFeedback("Welcome back! Session restored.", "green");
                syncFileSystemExplorerNodes();
                return;
            }

            const res = await fetch(`${SERVER_URL}/auth/send-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: activeUserPhone })
            });
            if (res.ok) {
                triggerLayoutTransition('view-otp');
                printFeedback("Code sent! Check your Telegram App.", "green");
            } else { printFeedback("Access Denied", "red"); }
        } catch (e) { printFeedback("Server connection failed.", "red"); }
    }

    async function executeOtpVerification() {
        const otpVal = document.getElementById('otp-field').value.trim();
        try {
            const res = await fetch(`${SERVER_URL}/auth/verify-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: activeUserPhone, otp_code: otpVal })
            });
            if (res.ok) {
                localStorage.setItem("authenticated_user_phone", activeUserPhone);
                triggerLayoutTransition('view-drive');
                printFeedback("Login successful!", "green");
                syncFileSystemExplorerNodes();
            } else { printFeedback("Invalid passcode", "red"); }
        } catch (e) { printFeedback("Verification failed.", "red"); }
    }

    async function syncFileSystemExplorerNodes() {
        try {
            const url = `${SERVER_URL}/drive/explorer/nodes?phone_number=${encodeURIComponent(activeUserPhone)}&parent_folder_id=${currentFolderId}`;
            const res = await fetch(url);
            const data = await res.json();
            
            if (res.ok) {
                rawDirectoryFiles = data.files;
                rawDirectoryFolders = data.folders;
                renderExplorerGrid(rawDirectoryFolders, rawDirectoryFiles);
                renderBreadcrumbTrail();
            }
        } catch (e) { printFeedback("Failed to load directory data.", "red"); }
    }

    function renderBreadcrumbTrail() {
        const trailContainer = document.getElementById('breadcrumbs-trail');
        trailContainer.innerHTML = "";
        
        navigationBreadcrumbsCache.forEach((crumb, index) => {
            const nodeSpan = document.createElement('span');
            if (index === navigationBreadcrumbsCache.length - 1) {
                nodeSpan.innerHTML = `<span style="color:#334155;">${crumb.name}</span>`;
            } else {
                nodeSpan.innerHTML = `<span class="crumb-node" onclick="navigateBreadcrumbDepth(${index})">${crumb.name}</span> <span class="crumb-separator">/</span> `;
            }
            trailContainer.appendChild(nodeSpan);
        });
    }

    function navigateBreadcrumbDepth(targetIndex) {
        const selectedCrumb = navigationBreadcrumbsCache[targetIndex];
        navigationBreadcrumbsCache = navigationBreadcrumbsCache.slice(0, targetIndex + 1);
        currentFolderId = selectedCrumb.id;
        syncFileSystemExplorerNodes();
    }

    function drillDownFolder(folderId, folderName) {
        currentFolderId = folderId;
        navigationBreadcrumbsCache.push({ id: folderId, name: folderName });
        syncFileSystemExplorerNodes();
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024, sizes = ['Bytes', 'KB', 'MB', 'GB'], i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function renderExplorerGrid(folders, files) {
        const tbody = document.getElementById('file-table-body');
        tbody.innerHTML = "";
        
        if (folders.length === 0 && files.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 30px; color:var(--text-muted);">This folder is empty.</td></tr>`;
            return;
        }

        folders.forEach(dir => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="folder-item" onclick="drillDownFolder('${dir._id}', '${dir.folder_name}')">📁 ${dir.folder_name}</span></td>
                <td style="color:var(--text-muted);">Folder</td>
                <td class="action-cell">
                    <button type="button" class="btn-action btn-danger" onclick="executeFolderDeletion('${dir._id}')">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });

        files.forEach(file => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="file-item">📄 ${file.filename}</span></td>
                <td style="color:var(--text-muted);">${formatBytes(file.size)}</td>
                <td class="action-cell">
                    <a class="btn-action" href="${SERVER_URL}/drive/download/${file._id}?phone_number=${encodeURIComponent(activeUserPhone)}" target="_blank">Download</a>
                    <button type="button" class="btn-action btn-danger" onclick="executeFileDeletion('${file._id}')">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    async function executeFileDeletion(fileId) {
        if (!confirm("Are you sure you want to delete this file?")) return;
        printFeedback("Deleting file...", "orange");
        try {
            const res = await fetch(`${SERVER_URL}/drive/file/${fileId}?phone_number=${encodeURIComponent(activeUserPhone)}`, { method: 'DELETE' });
            if (res.ok) {
                printFeedback("File deleted.", "green");
                syncFileSystemExplorerNodes();
            } else { printFeedback("Failed to delete.", "red"); }
        } catch (e) { printFeedback("Network error.", "red"); }
    }

    async function executeFolderDeletion(folderId) {
        if (!confirm("⚠️ Deleting this folder will erase ALL subfolders and files inside it. Proceed?")) return;
        printFeedback("Deleting folder and contents...", "orange");
        try {
            const res = await fetch(`${SERVER_URL}/drive/folder/${folderId}?phone_number=${encodeURIComponent(activeUserPhone)}`, { method: 'DELETE' });
            if (res.ok) {
                printFeedback("Folder deleted.", "green");
                syncFileSystemExplorerNodes();
            } else { printFeedback("Failed to delete.", "red"); }
        } catch (e) { printFeedback("Network error.", "red"); }
    }

    async function executeFolderCreation() {
        const field = document.getElementById('folder-name-field');
        const folderName = field.value.trim();
        if (!folderName) return alert("Please enter a folder name.");
        
        printFeedback("Creating folder...", "orange");
        try {
            const res = await fetch(`${SERVER_URL}/drive/folder/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folder_name: folderName, phone_number: activeUserPhone, parent_folder_id: currentFolderId })
            });
            if (res.ok) {
                printFeedback("Folder created.", "green");
                field.value = "";
                syncFileSystemExplorerNodes();
            }
        } catch (e) { printFeedback("Error creating folder.", "red"); }
    }

    async function executeCloudUpload() {
        const fileInput = document.getElementById('file-payload');
        if (fileInput.files.length === 0) return alert("Please select a file to upload.");
        printFeedback("Uploading file...", "orange");

        const structuralPayload = new FormData();
        structuralPayload.append("phone_number", activeUserPhone);
        structuralPayload.append("parent_folder_id", currentFolderId);
        structuralPayload.append("file", fileInput.files[0]);

        try {
            const res = await fetch(`${SERVER_URL}/drive/upload`, { method: 'POST', body: structuralPayload });
            if (res.ok) {
                printFeedback("Upload complete!", "green");
                fileInput.value = "";
                syncFileSystemExplorerNodes();
            } else { printFeedback("Upload failed.", "red"); }
        } catch (e) { printFeedback("Upload error.", "red"); }
    }

    function filterFileExplorer() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        const filteredFolders = rawDirectoryFolders.filter(f => f.folder_name.toLowerCase().includes(query));
        const filteredFiles = rawDirectoryFiles.filter(f => f.filename.toLowerCase().includes(query));
        renderExplorerGrid(filteredFolders, filteredFiles);
    }

    function executeSessionPurge() {
        localStorage.clear(); activeUserPhone = ""; triggerLayoutTransition('view-phone');
        printFeedback("Logged out successfully.", "slate");
    }
</script>
</body>
</html>
