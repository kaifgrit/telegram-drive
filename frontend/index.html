<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Drive Cloud Explorer</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .app-card {
        background: white;
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 650px;
        box-sizing: border-box;
      }
      h2,
      h3 {
        color: #0088cc;
        margin-top: 0;
        margin-bottom: 20px;
        text-align: center;
      }
      p {
        color: #555;
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
        margin-bottom: 25px;
      }
      input[type="text"] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 15px;
        background: #f8fafc;
      }
      button {
        width: 100%;
        padding: 14px;
        background: #0088cc;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 5px;
      }
      button:hover {
        background: #0077b3;
      }
      .hidden-layout {
        display: none !important;
      }
      #message-banner {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        display: none;
        background: #f1f5f9;
        color: #334155;
        text-align: center;
      }
      .upload-zone {
        border: 2px dashed #cbd5e1;
        padding: 20px;
        border-radius: 12px;
        background: #f8fafc;
        margin-top: 15px;
        text-align: center;
      }
      .logout-link {
        display: block;
        text-align: center;
        color: #ef4444;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: underline;
        margin-top: 25px;
      }

      /* FILE MANAGER GRID STYLES */
      .explorer-section {
        margin-top: 30px;
        border-top: 1px solid #e2e8f0;
        padding-top: 20px;
      }
      .search-box {
        margin-bottom: 15px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        font-size: 14px;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
      }
      th {
        background: #f8fafc;
        color: #475569;
        font-weight: 600;
      }
      tr:hover {
        background: #fdfdfd;
      }
      .dl-btn {
        background: #10b981;
        padding: 6px 12px;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
        display: inline-block;
      }
      .dl-btn:hover {
        background: #059669;
      }
    </style>
  </head>
  <body>
    <div class="app-card">
      <h2>Telegram Drive Engine</h2>

      <div id="view-phone">
        <p>Enter your Telegram number in standard international format.</p>
        <input type="text" id="phone-field" placeholder="+918853438021" />
        <button type="button" onclick="executeSessionHandshake()">
          Connect Storage Instance
        </button>
      </div>

      <div id="view-otp" class="hidden-layout">
        <p>Input validation passcode sent to your official Telegram channel.</p>
        <input type="text" id="otp-field" placeholder="Enter Secure Passcode" />
        <button type="button" onclick="executeOtpVerification()">
          Authorize & Mount Drive
        </button>
      </div>

      <div id="view-drive" class="hidden-layout">
        <h3>⚡ Virtual Cloud Storage Mounted</h3>

        <div class="upload-zone">
          <input type="file" id="file-payload" />
          <button type="button" onclick="executeCloudUpload()">
            Commit Stream to Cloud
          </button>
        </div>

        <div class="explorer-section">
          <h3>🗂️ File Storage Virtual VFS</h3>
          <input
            type="text"
            id="search-input"
            class="search-box"
            placeholder="🔍 Search files by keyword..."
            oninput="filterFileExplorer()"
          />

          <table>
            <thead>
              <tr>
                <th>File Name</th>
                <th>Size (Bytes)</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="file-table-body"></tbody>
          </table>
        </div>

        <div class="logout-link" onclick="executeSessionPurge()">
          Disconnect Local Environment
        </div>
      </div>

      <div id="message-banner"></div>
    </div>

    <script>
      const SERVER_URL = "http://127.0.0.1:8000/api";
      let activeUserPhone =
        localStorage.getItem("authenticated_user_phone") || "";
      let localFilesArray = []; // Caches current items for quick local searching

      window.onload = function () {
        if (activeUserPhone) {
          triggerLayoutTransition("view-drive");
          printFeedback(`Active session restored: ${activeUserPhone}`, "green");
          loadUserFiles();
        }
      };

      function printFeedback(msg, styleColor = "slate") {
        const banner = document.getElementById("message-banner");
        banner.style.display = "block";
        banner.innerText = msg;
        if (styleColor === "green") {
          banner.style.backgroundColor = "#bbf7d0";
          banner.style.color = "#15803d";
        } else if (styleColor === "orange") {
          banner.style.backgroundColor = "#fed7aa";
          banner.style.color = "#c2410c";
        } else if (styleColor === "red") {
          banner.style.backgroundColor = "#fecaca";
          banner.style.color = "#b91c1c";
        } else {
          banner.style.backgroundColor = "#e2e8f0";
          banner.style.color = "#334155";
        }
      }

      function triggerLayoutTransition(targetId) {
        document.getElementById("view-phone").classList.add("hidden-layout");
        document.getElementById("view-otp").classList.add("hidden-layout");
        document.getElementById("view-drive").classList.add("hidden-layout");
        document.getElementById(targetId).classList.remove("hidden-layout");
      }

      async function executeSessionHandshake() {
        const inputVal = document.getElementById("phone-field").value.trim();
        if (!inputVal) return alert("Phone number required.");
        activeUserPhone = inputVal;
        printFeedback("Evaluating server lifecycle nodes...", "orange");

        try {
          const check = await fetch(`${SERVER_URL}/auth/check-session`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone_number: activeUserPhone }),
          });
          const sessionStatus = await check.json();

          if (sessionStatus.status === "authenticated") {
            localStorage.setItem("authenticated_user_phone", activeUserPhone);
            triggerLayoutTransition("view-drive");
            printFeedback(
              "System verification accepted. Drive online.",
              "green",
            );
            loadUserFiles();
            return;
          }

          const res = await fetch(`${SERVER_URL}/auth/send-code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone_number: activeUserPhone }),
          });
          const data = await res.json();

          if (res.ok) {
            triggerLayoutTransition("view-otp");
            printFeedback("Validation code sent! Check Telegram App.", "green");
          } else {
            printFeedback(`Fault: ${data.detail || "Access Denied"}`, "red");
          }
        } catch (e) {
          printFeedback("Connection timed out.", "red");
        }
      }

      async function executeOtpVerification() {
        const otpVal = document.getElementById("otp-field").value.trim();
        try {
          const res = await fetch(`${SERVER_URL}/auth/verify-code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              phone_number: activeUserPhone,
              otp_code: otpVal,
            }),
          });
          if (res.ok) {
            localStorage.setItem("authenticated_user_phone", activeUserPhone);
            triggerLayoutTransition("view-drive");
            printFeedback("Authorization complete. Vault mounted.", "green");
            loadUserFiles();
          } else {
            printFeedback("Invalid Token code passed", "red");
          }
        } catch (e) {
          printFeedback("Verification failure.", "red");
        }
      }

      async function loadUserFiles() {
        try {
          const res = await fetch(
            `${SERVER_URL}/drive/files?phone_number=${encodeURIComponent(activeUserPhone)}`,
          );
          const data = await res.json();
          if (res.ok) {
            localFilesArray = data.files;
            renderExplorerGrid(localFilesArray);
          }
        } catch (e) {
          console.error("Error displaying files data structure arrays:", e);
        }
      }

      function renderExplorerGrid(items) {
        const tbody = document.getElementById("file-table-body");
        tbody.innerHTML = "";

        if (items.length === 0) {
          tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#94a3b8;">No records mapped in database context.</td></tr>`;
          return;
        }

        items.forEach((file) => {
          const row = document.createElement("tr");
          row.innerHTML = `
                <td><b>${file.filename}</b></td>
                <td>${file.size.toLocaleString()}</td>
                <td><a class="dl-btn" href="${SERVER_URL}/drive/download/${file._id}?phone_number=${encodeURIComponent(activeUserPhone)}" target="_blank">📥 Download</a></td>
            `;
          tbody.appendChild(row);
        });
      }

      function filterFileExplorer() {
        const query = document
          .getElementById("search-input")
          .value.toLowerCase()
          .trim();
        const filtered = localFilesArray.filter((f) =>
          f.filename.toLowerCase().includes(query),
        );
        renderExplorerGrid(filtered);
      }

      async function executeCloudUpload() {
        const fileInput = document.getElementById("file-payload");
        if (fileInput.files.length === 0)
          return alert("Select an item payload file item first.");
        printFeedback(
          "Streaming binary frames into infrastructure...",
          "orange",
        );

        const structuralPayload = new FormData();
        structuralPayload.append("phone_number", activeUserPhone);
        structuralPayload.append("file", fileInput.files[0]);

        try {
          const res = await fetch(`${SERVER_URL}/drive/upload`, {
            method: "POST",
            body: structuralPayload,
          });
          if (res.ok) {
            printFeedback("Upload stream processed and stored!", "green");
            fileInput.value = "";
            loadUserFiles(); // Instantly refresh table ledger list views
          } else {
            printFeedback("Pipeline processing failure.", "red");
          }
        } catch (e) {
          printFeedback("Network transmission pipeline error.", "red");
        }
      }

      function executeSessionPurge() {
        localStorage.clear();
        activeUserPhone = "";
        triggerLayoutTransition("view-phone");
        printFeedback("Platform cache purged.", "slate");
      }
    </script>
  </body>
</html>
