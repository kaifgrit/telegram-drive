<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Drive | Professional Cloud</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
    
    <div id="view-phone" class="auth-card fade-in">
        <div class="brand-logo">✈️</div>
        <h2>Telegram Drive</h2>
        <p class="subtitle">Secure Personal Cloud Storage Engine</p>
        
        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phone-field" placeholder="+1 (234) 567-8900">
        </div>
        <button type="button" class="btn-primary" onclick="executeSessionHandshake()">Connect Storage Instance</button>
    </div>

    <div id="view-otp" class="auth-card hidden-layout">
        <div class="brand-logo">🔒</div>
        <h2>Verification Required</h2>
        <p class="subtitle">Enter the code sent to your Telegram app.</p>
        
        <div class="input-group">
            <label>Secure Passcode</label>
            <input type="text" id="otp-field" placeholder="Enter 5-digit code">
        </div>
        <button type="button" class="btn-primary" onclick="executeOtpVerification()">Authorize & Mount Drive</button>
    </div>

    <div id="view-dashboard-wrapper" class="dashboard-wrapper hidden-layout">
        
        <aside class="sidebar-nav">
            <div class="nav-brand">
                <span class="logo-icon">✈️</span> TG Drive
            </div>
            <button class="nav-item active" onclick="switchRoute('drive')">📁 My Drive</button>
            <button class="nav-item" onclick="switchRoute('gallery')">🖼️ Photo Gallery</button>
            <div class="spacer"></div>
            <button class="nav-item text-danger" onclick="executeSessionPurge()">Logout</button>
        </aside>

        <main class="dashboard-main">
            
            <div id="route-drive" class="route-view active-route fade-in">
                <header class="dashboard-header">
                    <div>
                        <h2>Your Workspace</h2>
                        <p class="subtitle">Manage and organize your secure file system.</p>
                    </div>
                </header>
                
                <div class="control-panel-grid">
                    <div class="control-card slide-up">
                        <div class="input-group">
                            <label>📁 Create Directory</label>
                            <input type="text" id="folder-name-field" placeholder="Folder Name (e.g. Invoices)">
                        </div>
                        <button type="button" class="btn-primary" onclick="executeFolderCreation()">Create Folder</button>
                    </div>
                    <div class="control-card slide-up" style="animation-delay: 0.1s;">
                        <div class="input-group">
                            <label>📤 Upload File</label>
                            <input type="file" id="file-payload">
                        </div>
                        <button type="button" class="btn-primary" onclick="executeCloudUpload()">Upload to Current Folder</button>
                    </div>
                </div>

                <div class="explorer-section slide-up" style="animation-delay: 0.2s;">
                    <div id="breadcrumbs-trail" class="breadcrumbs-bar"></div>
                    
                    <div class="input-group search-bar">
                        <input type="text" id="search-input" placeholder="🔍 Search current directory..." oninput="filterFileExplorer()">
                    </div>
                    
                    <div class="table-container">
                        <table class="responsive-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Type / Size</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="file-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="route-gallery" class="route-view hidden-layout">
                <header class="dashboard-header">
                    <div>
                        <h2>Media Gallery</h2>
                        <p class="subtitle">All your images in one place.</p>
                    </div>
                </header>
                
                <div id="gallery-grid" class="gallery-grid">
                    </div>
            </div>

        </main>
    </div>

</div>

<div id="message-banner" class="toast-banner"></div>

<script src="js/script.js"></script>
</body>
</html>
